names:
  service: fpa-dashboard

project:
  squad: finance
  primary_maintainer: elle-del
  public_api: false
  private_api: true

deploy:
  k8s_clusters:
    - backend-dc2-prod
    - backend-sv1-prod

  service_images:
    fpa-dashboard:
      version: PENDING_FIRST_BUILD  # Update after first CI build

  # Resources (production - slightly more headroom)
  cpu: 200
  cpu_limit: 500
  memory: 256
  memory_limit: 512
  ephemeral_storage_limit: 1

  instances: 2  # HA in prod

  service:
    - name: fpa-dashboard
      port: 8080
      tags: ["consul"]
      check:
        type: http
        path: /health
        interval: 30s
        timeout: 10s
      ready:
        type: http
        path: /ready
        interval: 5s
        timeout: 10s

  env:
    static:
      ENV: production
